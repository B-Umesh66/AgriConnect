apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5500"
        prometheus.io/path: "/metrics"

    spec:
      containers:
        - name: backend
          image: shanmuk2309/agriconnect-backend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 5500

          envFrom:
            - secretRef:
                name: backend-secret

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "500m"
