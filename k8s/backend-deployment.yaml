apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: shanmuk2309/agriconnect-backend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 5500

          envFrom:
            - secretRef:
                name: backend-secret